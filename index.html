<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<!-- LOGIN -->
<div id="loginScreen" class="flex items-center justify-center h-screen">
  <div class="w-[90%] max-w-sm p-6 bg-white/10 rounded-xl">

    <h2 class="text-xl mb-4 text-center">Admin Login</h2>

    <input id="email" placeholder="Email"
      class="w-full mb-3 p-2 bg-white/10 rounded">

    <input id="password" type="password" placeholder="Password"
      class="w-full mb-3 p-2 bg-white/10 rounded">

    <button onclick="login()"
      class="w-full bg-blue-500 py-2 rounded">
      Login
    </button>

  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="dashboard" class="hidden h-screen flex flex-col">

  <div class="p-4 border-b border-white/10 flex justify-between">
    <h2 class="text-lg">Admin Panel</h2>

    <button onclick="logout()"
      class="bg-red-500 px-3 py-1 rounded text-sm">
      Logout
    </button>
  </div>

  <div id="users" class="flex-1 overflow-y-auto p-3 space-y-3"></div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
